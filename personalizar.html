<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personalizar - Onyx Bijuteria</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#071224,#0b1f3a);
  color:white;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.25) 1px, transparent 1px);
  background-size:60px 60px;
  animation:particlesMove 60s linear infinite;
  pointer-events:none;
  opacity:0.25;
}
@keyframes particlesMove{from{transform:translateY(0)}to{transform:translateY(-200px)}}
header{
  text-align:center;
  padding:60px 20px;
  font-family:'Playfair Display',serif;
  font-size:42px;
  letter-spacing:6px;
  position:relative;
}
header::after{
  content:"";
  position:absolute;
  left:50%;
  bottom:0;
  width:180px;
  height:2px;
  background:linear-gradient(90deg,transparent,silver,transparent);
  animation:shine 4s infinite;
  transform:translateX(-50%);
}

footer{
text-align:center;
padding:30px;
margin-top:60px;
border-top:1px solid rgba(192,192,192,0.3);
color:silver;
}

@keyframes shine{0%{opacity:0.2}50%{opacity:1}100%{opacity:0.2}}
header p{font-size:16px;letter-spacing:2px;color:silver;}
nav{
  text-align:center;
  padding:20px;
  border-top:1px solid rgba(192,192,192,0.3);
  border-bottom:1px solid rgba(192,192,192,0.3);
  backdrop-filter:blur(4px);
}
nav a{
  color:silver;
  margin:0 20px;
  text-decoration:none;
  font-weight:500;
  transition:0.3s;
}
nav a:hover{color:white;text-shadow:0 0 8px silver}
section{
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
}
h2{font-family:'Playfair Display',serif;color:silver;margin-bottom:30px;}
.custom-box{
  background:#0f2747;
  padding:30px;
  border-radius:12px;
  border:1px solid rgba(192,192,192,0.4);
  max-width:500px;
  margin:auto;
  box-shadow:0 0 15px rgba(200,200,200,0.15);
}
select,input{
  width:100%;
  padding:10px;
  margin-top:10px;
  margin-bottom:20px;
  border-radius:6px;
  border:none;
}
.preview{
  margin-top:20px;
  padding:15px;
  background:#081528;
  border-radius:8px;
  border:1px solid silver;
}
.corner{
  position:fixed;
  width:150px;
  height:150px;
  pointer-events:none;
}
.corner svg{
  width:100%;
  height:100%;
  stroke:silver;
  stroke-width:1.5;
  fill:none;
  filter:drop-shadow(0 0 6px silver);
  animation:cornerGlow 6s ease-in-out infinite;
}
@keyframes cornerGlow{0%{opacity:0.6;filter:drop-shadow(0 0 3px silver)}50%{opacity:1;filter:drop-shadow(0 0 12px silver)}100%{opacity:0.6;filter:drop-shadow(0 0 3px silver)}}
.top-left{top:10px;left:10px}
.top-right{top:10px;right:10px;transform:scaleX(-1)}
.bottom-left{bottom:10px;left:10px;transform:scaleY(-1)}
.bottom-right{bottom:10px;right:10px;transform:scale(-1)}
#mouseCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;}
button{background:linear-gradient(45deg,#cfd2d6,#f2f2f2); color:#0b1f3a; border:none; padding:10px 18px; margin-top:10px; border-radius:6px; cursor:pointer; font-weight:bold; transition:0.3s;}
button:hover{box-shadow:0 0 10px silver; transform:translateY(-2px);}
</style>
</head>
<body>

<div class="corner top-left"><svg viewBox="0 0 100 100"><path d="M5 95 L5 40 L20 25 L40 20 L60 10 L80 5"/><path d="M5 60 L30 60 L45 45 L60 45"/></svg></div>
<div class="corner top-right"><svg viewBox="0 0 100 100"><path d="M5 95 L5 40 L20 25 L40 20 L60 10 L80 5"/><path d="M5 60 L30 60 L45 45 L60 45"/></svg></div>
<div class="corner bottom-left"><svg viewBox="0 0 100 100"><path d="M5 95 L5 40 L20 25 L40 20 L60 10 L80 5"/><path d="M5 60 L30 60 L45 45 L60 45"/></svg></div>
<div class="corner bottom-right"><svg viewBox="0 0 100 100"><path d="M5 95 L5 40 L20 25 L40 20 L60 10 L80 5"/><path d="M5 60 L30 60 L45 45 L60 45"/></svg></div>
<canvas id="mouseCanvas"></canvas>

<section id="personalizar">
<h2>Criar Peça Personalizada</h2>

<div class="custom-box">

<label>Tipo de peça</label>
<select id="tipo">
<option>Colar</option>
<option>Pulseira</option>
<option>Brincos</option>
</select>

<label>Material</label>
<select id="material">
<option>Prata Onyx</option>
<option>Aço</option>
<option>Pérolas</option>
<option>Pedras Negras</option>
</select>

<label>Descrição do pedido</label>
<input id="gravacao" placeholder="Descreve a tua ideia...(nome)">
<button onclick="gerarPreview()">Simular Peça</button>
<div class="preview" id="preview">A tua peça personalizada aparecerá aqui.</div>
</div>

</section>

<footer>
© 2026 Onyx - Bijuteria Artesanal
</footer>

<script>
const canvas=document.getElementById('mouseCanvas');
const ctx=canvas.getContext('2d');
let particles=[];
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);
window.addEventListener('mousemove',(e)=>{
for(let i=0;i<3;i++){
particles.push({x:e.clientX,y:e.clientY,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5,life:60});
}});
function animateParticles(){
ctx.clearRect(0,0,canvas.width,canvas.height);
for(let i=particles.length-1;i>=0;i--){
let p=particles[i];
p.x+=p.vx;p.y+=p.vy;p.life--;
ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle='rgba(220,220,220,'+(p.life/60)+')';
ctx.fill();
if(p.life<=0){particles.splice(i,1);}
}
requestAnimationFrame(animateParticles);
}
animateParticles();

function gerarPreview(){

let tipo = document.getElementById("tipo").value;
let material = document.getElementById("material").value;
let gravacao = document.getElementById("gravacao").value;

let texto = "Peça personalizada:\n" +
"Tipo: " + tipo + "\n" +
"Material: " + material + "\n";

if(gravacao){
texto += "Descrição: " + gravacao;
}


document.getElementById("preview").innerText = texto;

}
</script>

</body>
